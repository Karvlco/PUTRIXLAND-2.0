<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>PUTRIXLAND | Una experiencia a través de Chocho</title>

<link
href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="loadingScreen">

    <h1 class="logo">
        PUTRIXLAND
    </h1>

    <p class="subtitle">

        Una experiencia a través de Chocho

    </p>

    <button id="playButton">

        💮 JUGAR

    </button>

    <button>

        ⚙ AJUSTES

    </button>

    <button>

        📖 CRÉDITOS

    </button>

</div>

<canvas id="game"></canvas>
<!-- ===========================
     SELECTOR DE PERSONAJES
=========================== -->

<div id="characterScreen">

    <button id="leftButton" class="arrowButton">◀</button>

    <div id="selectorContainer">

        <img
            id="selectorImage"
            src="assets/sprites/Selector_xuxi.PNG"
            alt="Selector de personaje">

        <button id="selectCharacter">

            💮 SELECCIONAR

        </button>

    </div>

    <button id="rightButton" class="arrowButton">▶</button>

</div>
<script src="game.js"></script>

</body>

</html>
